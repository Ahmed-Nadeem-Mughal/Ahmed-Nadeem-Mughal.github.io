		<style>
			.project-card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 2.5rem;
				transition: all var(--transition);
				position: relative;
				overflow: hidden;
				margin-bottom: 2rem;
			}
			
			.project-card::before {
				content: '';
				position: absolute;
				inset: 0;
				background: linear-gradient(135deg, rgba(124,111,205,0.05), transparent);
				opacity: 0;
				transition: opacity var(--transition);
			}
			
			.project-card:hover {
				transform: translateY(-4px);
				border-color: var(--accent2);
			}
			
			.project-card:hover::before {
				opacity: 1;
			}
			
			.project-header {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				margin-bottom: 1.5rem;
			}
			
			.project-status {
				font-family: 'Space Mono', monospace;
				font-size: 0.6rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				padding: 0.3rem 0.8rem;
				border-radius: 4px;
				background: rgba(78,205,196,0.1);
				color: var(--code);
				border: 1px solid rgba(78,205,196,0.3);
			}
			
			.project-status.wip {
				background: rgba(200,169,110,0.1);
				color: var(--accent);
				border-color: rgba(200,169,110,0.3);
			}
			
			.project-title {
				font-family: 'Playfair Display', serif;
				font-size: 1.8rem;
				margin-bottom: 1rem;
			}
			
			.project-description {
				color: var(--muted);
				font-size: 1.05rem;
				line-height: 1.8;
				margin-bottom: 1.5rem;
			}
			
			.project-tech {
				display: flex;
				flex-wrap: wrap;
				gap: 0.5rem;
				margin-bottom: 1.5rem;
			}
			
			.tech-tag {
				font-family: 'Space Mono', monospace;
				font-size: 0.6rem;
				padding: 0.3rem 0.7rem;
				border: 1px solid var(--border);
				border-radius: 4px;
				color: var(--muted);
			}
			
			.project-links {
				display: flex;
				gap: 1rem;
			}
			
			.project-link {
				font-family: 'Space Mono', monospace;
				font-size: 0.6rem;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--accent);
				text-decoration: none;
				padding: 0.5rem 1rem;
				border: 1px solid var(--accent);
				border-radius: 6px;
				transition: all var(--transition);
			}
			
			.project-link:hover {
				background: var(--accent);
				color: var(--bg);
			}
			
			.project-filters {
				grid-column: 1/-1;
				display: flex;
				gap: 1.5rem;
				justify-content: center;
				margin-bottom: 3rem;
			}
			
			.filter-btn {
				font-family: 'Space Mono', monospace;
				font-size: 0.65rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				color: var(--muted);
				background: none;
				border: none;
				cursor: pointer;
				padding: 0.5rem 1rem;
				border-radius: 4px;
				transition: all var(--transition);
			}
			
			.filter-btn:hover,
			.filter-btn.active {
				color: var(--lit);
				background: rgba(232,165,152,0.1);
			}
		</style>
